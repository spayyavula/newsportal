name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "Dockerfile"
      - "deploy/cloud-run/frontend-service.yaml"
      - "deploy/cloud-build.frontend.yaml"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: sanenews
  GCP_REGION: us-west1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Build frontend image
        run: gcloud builds submit --project "$GCP_PROJECT_ID" --config deploy/cloud-build.frontend.yaml .

      - name: Render frontend service manifest
        shell: bash
        run: |
          sed \
            -e "s|__RUNTIME_SERVICE_ACCOUNT__|${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}|g" \
            -e "s|__CMS_PUBLIC_URL__|${{ secrets.CMS_PUBLIC_URL }}|g" \
            deploy/cloud-run/frontend-service.yaml > /tmp/frontend-service.yaml

      - name: Deploy frontend to Cloud Run
        run: gcloud run services replace /tmp/frontend-service.yaml --project "$GCP_PROJECT_ID" --region "$GCP_REGION"