apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: newsportal-frontend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: __RUNTIME_SERVICE_ACCOUNT__
      containers:
        - image: us-west1-docker.pkg.dev/sanenews/newsportal/frontend:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_STRAPI_URL
              value: __CMS_PUBLIC_URL__
            - name: OPENAI_MODEL
              value: gpt-4.1-mini
            - name: OPENAI_BASE_URL
              value: https://api.openai.com/v1
            - name: EXA_BASE_URL
              value: https://api.exa.ai
            - name: STRAPI_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: STRAPI_API_TOKEN
                  key: latest
            - name: NEXT_PREVIEW_SECRET
              valueFrom:
                secretKeyRef:
                  name: NEXT_PREVIEW_SECRET
                  key: latest
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: OPENAI_API_KEY
                  key: latest
            - name: EXA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: EXA_API_KEY
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 1Gi