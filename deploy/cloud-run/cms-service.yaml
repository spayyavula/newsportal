apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: newsportal-cms
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cloudsql-instances: sanenews:us-west1:net01
    spec:
      containerConcurrency: 40
      timeoutSeconds: 300
      serviceAccountName: __RUNTIME_SERVICE_ACCOUNT__
      containers:
        - image: us-west1-docker.pkg.dev/sanenews/newsportal/cms:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PUBLIC_URL
              value: https://cms.sanenews.net
            - name: DATABASE_CLIENT
              value: postgres
            - name: DATABASE_HOST
              value: /cloudsql
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: strapi
            - name: DATABASE_USERNAME
              value: strapi
            - name: DATABASE_SSL
              value: "false"
            - name: DATABASE_SCHEMA
              value: public
            - name: DATABASE_SOCKET_PATH
              value: /cloudsql
            - name: DATABASE_INSTANCE_UNIX_SOCKET
              value: sanenews:us-west1:net01
            - name: APP_KEYS
              valueFrom:
                secretKeyRef:
                  name: APP_KEYS
                  key: latest
            - name: API_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: API_TOKEN_SALT
                  key: latest
            - name: ADMIN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ADMIN_JWT_SECRET
                  key: latest
            - name: TRANSFER_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: TRANSFER_TOKEN_SALT
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET
                  key: latest
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: ENCRYPTION_KEY
                  key: latest
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: DATABASE_PASSWORD
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 1Gi